; rtty configuration example
; Priority: defaults < config file < command line

[rtty]
id = device-001
group = default
host = 127.0.0.1
port = 5912
heartbeat = 30
http-timeout = 30
description = edge gateway in room A
token = your-token
username = root
reconnect = true
verbose = false
background = false

[ssl]
enabled = false
insecure = false
; cacert = /etc/ssl/certs/ca-certificates.crt
; cert = /etc/rtty/client.crt
; key = /etc/rtty/client.key
